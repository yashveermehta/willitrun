name: Refresh Data

on:
  schedule:
    - cron: "0 2 * * 0"  # Sundays at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Update GPU specs
        run: python scripts/update_gpus.py

      - name: Update model list
        run: python scripts/update_models.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet src/lib/data/ || (
            git add src/lib/data/gpus.json src/lib/data/models.json &&
            git commit -m "chore: refresh GPU and model data" &&
            git push
          )
